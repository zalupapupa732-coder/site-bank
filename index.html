<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПУЛЬС БАНК — мобильное приложение</title>
    <style>
        /* ===== ОБНУЛЕНИЕ И БАЗА ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a2b1e 0%, #1a4d2e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
        .screen {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 48px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* ===== ЛОГОТИП ===== */
        .image {
            max-width: 180px;
            height: auto;
            display: block;
            margin-bottom: 32px;
        }

        /* ===== НАВИГАЦИЯ (О НАС, СТОИМОСТЬ, КОНТАКТЫ) ===== */
        .frame {
            display: flex;
            gap: 40px;
            margin-bottom: 60px;
            border-bottom: 2px solid #eef2f0;
            padding-bottom: 20px;
        }

        .text-wrapper {
            font-size: 18px;
            font-weight: 600;
            color: #2c5a3e;
            cursor: pointer;
            transition: color 0.2s;
            letter-spacing: 0.3px;
        }

        .text-wrapper:hover {
            color: #0a7c3e;
        }

        /* ===== ЗАГОЛОВОК ===== */
        .div {
            font-size: 56px;
            font-weight: 800;
            color: #0a2b1e;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .text-wrapper-2 {
            font-size: 22px;
            font-weight: 500;
            color: #4a6a5a;
            margin-bottom: 48px;
            border-left: 4px solid #2ecc71;
            padding-left: 20px;
        }

        /* ===== СЕТКА УСЛУГ (4 колонки) ===== */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-top: 20px;
        }

        /* Стиль для всех карточек-услуг */
        .frame-2, .frame-3, .frame-4, .frame-5,
        .frame-6, .frame-7, .frame-8, .frame-9, .frame-10 {
            background: #f8faf7;
            padding: 28px 16px;
            text-align: center;
            border-radius: 24px;
            font-size: 18px;
            font-weight: 600;
            color: #1a3d2c;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2e8e2;
        }

        .frame-2:hover, .frame-3:hover, .frame-4:hover, .frame-5:hover,
        .frame-6:hover, .frame-7:hover, .frame-8:hover, .frame-9:hover, .frame-10:hover {
            transform: translateY(-6px);
            background: white;
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.1);
            border-color: #2ecc71;
            color: #0a7c3e;
        }

        /* ===== АДАПТАЦИЯ ПОД ПЛАНШЕТ ===== */
        @media (max-width: 1000px) {
            .services-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
            .screen {
                padding: 32px 24px;
            }
            .div {
                font-size: 42px;
            }
        }

        /* ===== АДАПТАЦИЯ ПОД ТЕЛЕФОН ===== */
        @media (max-width: 700px) {
            .services-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            .frame {
                gap: 24px;
                flex-wrap: wrap;
            }
            .div {
                font-size: 32px;
            }
            .screen {
                padding: 24px 20px;
                border-radius: 32px;
            }
            .text-wrapper-2 {
                font-size: 18px;
                margin-bottom: 32px;
            }
        }

        @media (max-width: 480px) {
            .services-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="screen">
    <!-- Логотип — замените ссылку на вашу картинку, если нужно -->
    <img class="image" src="image-5.png" alt="ПУЛЬС БАНК логотип" onerror="this.style.display='none'">
    
    <!-- Меню -->
    <div class="frame">
        <div class="text-wrapper">О НАС</div>
        <div class="text-wrapper">СТОИМОСТЬ УСЛУГ</div>
        <div class="text-wrapper">КОНТАКТЫ</div>
    </div>
    
    <!-- Заголовки -->
    <div class="div">ПУЛЬС БАНК</div>
    <div class="text-wrapper-2">Приложение, которое управляет вашими финансами</div>
    
    <!-- Сетка услуг — 4 колонки, все карточки -->
    <div class="services-grid">
        <div class="frame-2">📱 ПЛАТЕЖИ</div>
        <div class="frame-3">💰 БЮДЖЕТ</div>
        <div class="frame-4">📈 ВКЛАДЫ</div>
        <div class="frame-5">💎 КЭШБЕКИ</div>
        <div class="frame-6">🔄 ПЕРЕВОДЫ</div>
        <div class="frame-7">🎯 ЦЕЛИ</div>
        <div class="frame-8">🏦 КРЕДИТЫ</div>
        <div class="frame-9">📊 АНАЛИТИКА</div>
    </div>
</div>
</body>
</html>
