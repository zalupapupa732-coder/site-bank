<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ПУЛЬС БАНК</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #101010;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 24px 20px 60px;
        }

        /* Основной контейнер — тёмный, как на картинке */
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #101010;
            min-height: 100vh;
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 24px;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
        }

        .menu-icon {
            font-size: 24px;
            color: white;
            cursor: pointer;
        }

        /* ===== БЛОК С ЗАГОЛОВКОМ (как на картинке) ===== */
        .hero {
            text-align: center;
            margin-bottom: 48px;
        }

        .hero-subtitle {
            color: #2ecc71;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 800;
            color: white;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .hero-title span {
            color: #2ecc71;
        }

        .hero-description {
            color: #888;
            font-size: 14px;
            line-height: 1.5;
            max-width: 280px;
            margin: 0 auto;
        }

        /* ===== КАРТОЧКИ УСЛУГ — как на картинке ===== */
        .services-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .service-card {
            background-color: #1a1a1a;
            border-radius: 16px;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #2a2a2a;
        }

        .service-card:hover {
            background-color: #222;
            border-color: #2ecc71;
        }

        .service-name {
            font-size: 18px;
            font-weight: 500;
            color: white;
        }

        .service-arrow {
            font-size: 20px;
            color: #2ecc71;
        }

        /* ===== НИЖНЕЕ МЕНЮ (О НАС, КОНТАКТЫ и т.д.) ===== */
        .bottom-menu {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            padding-top: 32px;
            border-top: 1px solid #2a2a2a;
            margin-top: 20px;
        }

        .bottom-menu-item {
            color: #666;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .bottom-menu-item:hover {
            color: #2ecc71;
        }

        /* Акцентный текст */
        .accent-text {
            color: #2ecc71;
        }

        /* Дополнительные стили */
        .section-title {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Шапка -->
    <div class="header">
        <div class="logo">ПУЛЬС БАНК</div>
        <div class="menu-icon">☰</div>
    </div>

    <!-- Главный блок с заголовком (как на картинке) -->
    <div class="hero">
        <div class="hero-subtitle">ПРИЛОЖЕНИЕ</div>
        <div class="hero-title">
            ПУЛЬС <span>БАНК</span>
        </div>
        <div class="hero-description">
            Управляй финансами<br>в одном приложении
        </div>
    </div>

    <!-- Список услуг — как на картинке (в столбик) -->
    <div class="services-grid">
        <div class="service-card">
            <span class="service-name">ВКЛАДЫ</span>
            <span class="service-arrow">→</span>
        </div>
        <div class="service-card">
            <span class="service-name">ЦЕЛИ</span>
            <span class="service-arrow">→</span>
        </div>
        <div class="service-card">
            <span class="service-name">БЮДЖЕТ</span>
            <span class="service-arrow">→</span>
        </div>
        <div class="service-card">
            <span class="service-name">КЭШБЕКИ</span>
            <span class="service-arrow">→</span>
        </div>
        <div class="service-card">
            <span class="service-name">КРЕДИТЫ</span>
            <span class="service-arrow">→</span>
        </div>
        <div class="service-card">
            <span class="service-name">ПЕРЕВОДЫ</span>
            <span class="service-arrow">→</span>
        </div>
        <div class="service-card">
            <span class="service-name">АНАЛИТИКА</span>
            <span class="service-arrow">→</span>
        </div>
    </div>

    <!-- Нижнее меню (О НАС, СТОИМОСТЬ УСЛУГ, КОНТАКТЫ и т.д.) -->
    <div class="bottom-menu">
        <div class="bottom-menu-item">О НАС</div>
        <div class="bottom-menu-item">СТОИМОСТЬ УСЛУГ</div>
        <div class="bottom-menu-item">КОНТАКТЫ</div>
        <div class="bottom-menu-item">ПОЛИТИКА</div>
    </div>
</div>
</body>
</html>
