<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПУЛЬС БАНК</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .screen {
            max-width: 1440px;
            width: 100%;
            background: white;
            padding: 20px;
        }
        
        img {
            max-width: 100%;
            height: auto;
        }
        
        .frame {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .text-wrapper {
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .div {
            font-size: 32px;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .text-wrapper-2, .text-wrapper-3, .text-wrapper-4 {
            font-size: 16px;
            margin: 10px 0;
        }
        
        .frame-2, .frame-3, .frame-4, .frame-5, 
        .frame-6, .frame-7, .frame-8, .frame-9, .frame-10 {
            display: inline-block;
            margin: 5px;
            padding: 10px 15px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        
        @media (max-width: 768px) {
            .div {
                font-size: 24px;
            }
            .frame {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="screen">
    <img class="image" src="image-5.png" alt="логотип" style="max-width: 100%;">
    
    <div class="frame">
        <div class="text-wrapper">О НАС</div>
        <div class="text-wrapper">СТОИМОСТЬ УСЛУГ</div>
        <div class="text-wrapper">КОНТАКТЫ</div>
    </div>
    
    <div class="div">ПУЛЬС БАНК</div>
    <div class="text-wrapper-2">ПРИЛОЖЕНИЕ</div>
    
    <div class="frame-2">ПЛАТЕЖИ</div>
    <div class="frame-3">БЮДЖЕТ</div>
    <div class="frame-4">ВКЛАДЫ</div>
    <div class="frame-5">КЭШБЕКИ</div>
    <div class="frame-6">ПЕРЕВОДЫ</div>
    <div class="frame-7">ЦЕЛИ</div>
    <div class="frame-8">КРЕДИТЫ</div>
    <div class="frame-9">АНАЛИТИКА</div>
</div>
</body>
</html>
